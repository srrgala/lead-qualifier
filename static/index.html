<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>C4 — Cualificador de leads</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f0f0f0;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    /* ── Layout ─────────────────────────────────────────── */
    #app {
      width: 100%;
      max-width: 680px;
      display: flex;
      flex-direction: column;
      gap: 0;
      background: #fff;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 24px rgba(0,0,0,.10);
    }

    /* ── Header ─────────────────────────────────────────── */
    #header {
      padding: 1.1rem 1.5rem;
      background: #1a1a1a;
      color: #fff;
      font-size: .95rem;
      font-weight: 600;
      letter-spacing: .02em;
    }
    #header span {
      opacity: .5;
      font-weight: 400;
      margin-left: .5rem;
      font-size: .85rem;
    }

    /* ── Chat area ───────────────────────────────────────── */
    #chat {
      flex: 1;
      min-height: 420px;
      max-height: 560px;
      overflow-y: auto;
      padding: 1.5rem 1.25rem;
      display: flex;
      flex-direction: column;
      gap: .75rem;
      scroll-behavior: smooth;
    }

    /* ── Bubbles ─────────────────────────────────────────── */
    .bubble {
      max-width: 80%;
      padding: .7rem 1rem;
      border-radius: 16px;
      font-size: .92rem;
      line-height: 1.55;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .bubble-system {
      align-self: flex-start;
      background: #f2f2f2;
      color: #1a1a1a;
      border-bottom-left-radius: 4px;
    }
    .bubble-user {
      align-self: flex-end;
      background: #1a1a1a;
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .bubble-error {
      align-self: flex-start;
      background: #fff0f0;
      color: #b91c1c;
      border: 1px solid #fecaca;
      border-bottom-left-radius: 4px;
    }

    /* ── Typing indicator ───────────────────────────────── */
    #typing {
      align-self: flex-start;
      display: none;
      padding: .6rem .9rem;
      background: #f2f2f2;
      border-radius: 16px;
      border-bottom-left-radius: 4px;
      gap: 4px;
    }
    #typing.visible { display: flex; align-items: center; }
    #typing span {
      width: 7px; height: 7px;
      background: #999;
      border-radius: 50%;
      animation: bounce .9s infinite ease-in-out;
    }
    #typing span:nth-child(2) { animation-delay: .15s; }
    #typing span:nth-child(3) { animation-delay: .30s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40%           { transform: translateY(-6px); }
    }

    /* ── Conversation closed ────────────────────────────── */
    #closed-notice {
      display: none;
      align-self: center;
      margin-top: .5rem;
      font-size: .8rem;
      color: #9ca3af;
      letter-spacing: .03em;
    }
    #closed-notice.visible { display: block; }

    /* ── Input area ─────────────────────────────────────── */
    #input-area {
      display: flex;
      align-items: flex-end;
      gap: .6rem;
      padding: 1rem 1.25rem;
      border-top: 1px solid #e5e5e5;
      background: #fff;
    }
    #input {
      flex: 1;
      resize: none;
      font-family: inherit;
      font-size: .92rem;
      line-height: 1.5;
      padding: .65rem .9rem;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      outline: none;
      max-height: 120px;
      overflow-y: auto;
      transition: border-color .15s;
    }
    #input:focus { border-color: #6b7280; }
    #input:disabled {
      background: #f9fafb;
      color: #9ca3af;
      cursor: not-allowed;
    }
    #send {
      flex-shrink: 0;
      width: 40px; height: 40px;
      border: none;
      border-radius: 10px;
      background: #1a1a1a;
      color: #fff;
      font-size: 1.1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .15s;
    }
    #send:hover:not(:disabled) { background: #374151; }
    #send:disabled { background: #d1d5db; cursor: not-allowed; }
  </style>
</head>
<body>
<div id="app">
  <div id="header">C4 <span>Cualificador de leads</span></div>

  <div id="chat">
    <!-- bubbles injected here -->
    <div id="typing">
      <span></span><span></span><span></span>
    </div>
    <div id="closed-notice">— Conversación finalizada —</div>
  </div>

  <div id="input-area">
    <textarea id="input" rows="1" placeholder="Escribe tu mensaje..."></textarea>
    <button id="send" title="Enviar">&#10148;</button>
  </div>
</div>

<script>
  // ── State ────────────────────────────────────────────────
  const history = [];        // {role, content} — full history sent to backend
  let   ended   = false;

  // ── DOM refs ─────────────────────────────────────────────
  const chat        = document.getElementById('chat');
  const typingEl    = document.getElementById('typing');
  const closedEl    = document.getElementById('closed-notice');
  const inputEl     = document.getElementById('input');
  const sendBtn     = document.getElementById('send');

  // ── Helpers ──────────────────────────────────────────────
  function addBubble(text, role) {
    // Insert before the typing indicator so order is always correct
    const div = document.createElement('div');
    div.className = `bubble bubble-${role}`;
    div.textContent = text;
    chat.insertBefore(div, typingEl);
    scrollToBottom();
  }

  function scrollToBottom() {
    chat.scrollTop = chat.scrollHeight;
  }

  function setTyping(show) {
    typingEl.classList.toggle('visible', show);
    scrollToBottom();
  }

  function setInputEnabled(enabled) {
    inputEl.disabled = !enabled;
    sendBtn.disabled = !enabled;
    if (enabled) inputEl.focus();
  }

  function endConversation() {
    ended = true;
    setInputEnabled(false);
    closedEl.classList.add('visible');
    scrollToBottom();
  }

  // ── Auto-grow textarea ───────────────────────────────────
  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
  });

  // ── Send ─────────────────────────────────────────────────
  async function send() {
    const text = inputEl.value.trim();
    if (!text || ended) return;

    // Show user bubble
    addBubble(text, 'user');
    history.push({ role: 'user', content: text });

    inputEl.value = '';
    inputEl.style.height = 'auto';
    setInputEnabled(false);
    setTyping(true);

    try {
      const res = await fetch('/qualify', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: history }),
      });

      if (!res.ok) {
        throw new Error(`HTTP ${res.status}`);
      }

      const data = await res.json();

      setTyping(false);
      addBubble(data.reply, 'system');

      // Pre-filter redirect (greeting, empty): don't close — invite the lead to continue.
      // The greeting/empty message is removed from history so the next real message starts clean.
      if (data.pre_filter?.passed === false) {
        const reason = data.pre_filter.reason;
        if (reason === 'greeting_only' || reason === 'empty_message') {
          history.pop(); // discard the non-starter user message
          setInputEnabled(true);
          return;
        }
        // spam / off_topic: conversation ends
        endConversation();
        return;
      }

      // Store full JSON as assistant turn (backend needs it for clarification counting)
      history.push({ role: 'assistant', content: JSON.stringify(data) });

      const nivel = data?.resolution?.nivel;
      if (nivel !== 'pendiente_clarificacion') {
        endConversation();
      } else {
        setInputEnabled(true);
      }
    } catch (err) {
      setTyping(false);
      addBubble('Ha ocurrido un error al conectar con el servidor. Por favor, inténtalo de nuevo.', 'error');
      // Remove last user message from history so the user can retry cleanly
      history.pop();
      setInputEnabled(true);
    }
  }

  sendBtn.addEventListener('click', send);
  inputEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      send();
    }
  });

  // ── Initial welcome ──────────────────────────────────────
  // Pure UI — does not go through backend, not added to history
  addBubble('¡Hola! Cuéntanos en qué podemos ayudarte y cómo podemos colaborar.', 'system');
  inputEl.focus();
</script>
</body>
</html>
